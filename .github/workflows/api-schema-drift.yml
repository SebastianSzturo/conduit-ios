name: API schema drift

on:
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node api/check-api-drift.mjs
